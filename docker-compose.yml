services:
  web:
    image: nginx:alpine
    container_name: elektromontag-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - site-data:/usr/share/nginx/html:ro
      - nginx-conf:/etc/nginx/conf.d:ro

  deploy:
    image: alpine/git
    container_name: elektromontag-deploy
    volumes:
      - site-data:/site
      - nginx-conf:/nginx
    entrypoint: /bin/sh
    command:
      - -c
      - |
        rm -rf /tmp/repo
        git clone --depth 1 https://github.com/JeszyAti/elektromontag.git /tmp/repo
        rm -rf /site/*
        cp -r /tmp/repo/dist/* /site/
        rm -rf /nginx/*
        cp -r /tmp/repo/nginx/* /nginx/
        rm -rf /tmp/repo
        echo "Deploy complete"

volumes:
  site-data:
  nginx-conf:
